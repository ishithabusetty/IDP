<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESP32-C3 Wearable Safety Monitor</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script crossorigin src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.22.20/babel.min.js"></script>
    <style>
      :root {
        --bg: #071315;
        --panel: #0e2023;
        --panel-2: #12282b;
        --panel-3: #173235;
        --line: rgba(148, 237, 218, 0.16);
        --text: #eefdf9;
        --muted: #92aaa7;
        --soft: #c6dcda;
        --mint: #62f1d2;
        --teal: #13b8a6;
        --cyan: #63d8ff;
        --green: #8ff5b2;
        --yellow: #ffd166;
        --orange: #ff985f;
        --red: #ff5d6c;
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.32);
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(98, 241, 210, 0.13), transparent 34rem),
          linear-gradient(135deg, #061112 0%, #071315 44%, #092022 100%);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      section {
        scroll-margin-top: 22px;
      }

      button,
      input {
        font: inherit;
      }

      .page-stack {
        display: grid;
        gap: 18px;
      }

      .page-grid {
        display: grid;
        gap: 18px;
      }

      .page-grid.two-col {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .page-grid.three-col {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .page-summary {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .page-summary-card {
        border: 1px solid rgba(148, 237, 218, 0.12);
        border-radius: var(--radius);
        padding: 14px;
        background: rgba(7, 19, 21, 0.42);
      }

      .page-summary-label {
        color: var(--muted);
        font-size: 12px;
      }

      .page-summary-value {
        margin-top: 10px;
        font-size: 20px;
        font-weight: 850;
      }

      .page-summary-note {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .page-badges {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .mini-chart {
        height: 150px;
        display: flex;
        align-items: end;
        gap: 6px;
        padding-top: 10px;
      }

      .mini-chart-bar {
        flex: 1;
        min-width: 8px;
        border-radius: 8px 8px 2px 2px;
        background: linear-gradient(180deg, var(--mint), rgba(19, 184, 166, 0.35));
      }

      .chart-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .chart-grid.single-plus-pair {
        grid-template-columns: minmax(0, 1fr);
      }

      .chart-grid.pairs {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .chart-grid.single-plus-pair .chart-card.full-width {
        grid-column: 1 / -1;
      }

      .chart-card {
        border: 1px solid rgba(148, 237, 218, 0.12);
        border-radius: var(--radius);
        background: rgba(7, 19, 21, 0.34);
        padding: 14px;
      }

      .chart-card h4 {
        margin: 0;
        font-size: 14px;
      }

      .chart-card p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      .chart-card .mini-chart {
        margin-top: 10px;
      }

      .airbag-visual-shell {
        width: 100%;
        min-height: 320px;
        aspect-ratio: 16 / 9;
        margin-top: 10px;
        border: 1px solid rgba(148, 237, 218, 0.12);
        border-radius: var(--radius);
        background:
          radial-gradient(circle at 50% 42%, rgba(98, 241, 210, 0.11), transparent 44%),
          linear-gradient(180deg, rgba(7, 19, 21, 0.9), rgba(10, 25, 28, 0.98));
        overflow: hidden;
      }

      .airbag-visual-shell *,
      .airbag-visual-shell *::before,
      .airbag-visual-shell *::after {
        box-sizing: border-box;
      }

      .airbag-panel {
        position: relative;
        width: 100%;
        height: 100%;
        padding: 18px 18px 16px;
        display: grid;
        grid-template-rows: minmax(0, 1fr);
        gap: 0;
      }

      .airbag-panel-header {
        text-align: center;
        font-size: clamp(22px, 2vw, 42px);
        line-height: 1.05;
        font-weight: 900;
        letter-spacing: 0;
        color: #2de0df;
        text-transform: uppercase;
      }

      .airbag-stage-strip {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .airbag-stage-chip {
        min-height: 74px;
        border-radius: 12px;
        border: 1px solid rgba(148, 237, 218, 0.12);
        background: rgba(7, 19, 21, 0.44);
        padding: 10px 10px 8px;
        display: grid;
        gap: 5px;
      }

      .airbag-stage-chip.is-active {
        border-color: rgba(98, 241, 210, 0.32);
        box-shadow: 0 0 0 1px rgba(98, 241, 210, 0.08), inset 0 0 40px rgba(98, 241, 210, 0.08);
      }

      .airbag-stage-chip .stage-title {
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .airbag-stage-chip .stage-subtitle {
        color: rgba(238, 253, 249, 0.9);
        font-size: 11px;
        line-height: 1.3;
      }

      .airbag-stage-chip .stage-pill {
        justify-self: start;
        margin-top: 2px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid currentColor;
        font-size: 11px;
        font-weight: 900;
      }

      .airbag-stage-chip.tone-green { color: #56da6a; }
      .airbag-stage-chip.tone-yellow { color: #f6ca50; }
      .airbag-stage-chip.tone-orange { color: #ff8a31; }
      .airbag-stage-chip.tone-red { color: #ff5d5d; }

      .airbag-stage-view {
        position: relative;
        isolation: isolate;
        border-radius: 14px;
        border: 1px solid rgba(148, 237, 218, 0.1);
        background:
          linear-gradient(180deg, rgba(7, 19, 21, 0.18), rgba(7, 19, 21, 0.34)),
          radial-gradient(circle at 50% 18%, rgba(98, 241, 210, 0.09), transparent 34%);
        overflow: hidden;
        display: grid;
        place-items: center;
        min-height: 340px;
      }

      .airbag-fallback-scene,
      .airbag-three-host {
        position: absolute;
        inset: 0;
      }

      .airbag-static-host {
        position: absolute;
        inset: 0;
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }

      .airbag-stage-image {
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
        display: block;
      }

      .airbag-three-host {
        z-index: 4;
      }

      .airbag-fallback-scene {
        z-index: 2;
        display: grid;
        place-items: center;
        pointer-events: none;
      }

      .airbag-stage-view::before {
        content: "";
        position: absolute;
        inset: auto 0 0;
        height: 44%;
        background:
        linear-gradient(to right, transparent 0, rgba(98, 241, 210, 0.08) 50%, transparent 100%),
          linear-gradient(180deg, transparent 0, rgba(10, 25, 28, 0.95) 100%);
        opacity: 0.95;
        z-index: 0;
      }

      .airbag-grid {
        position: absolute;
        inset: auto 0 0;
        height: 44%;
        background-image:
          linear-gradient(rgba(98, 241, 210, 0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(98, 241, 210, 0.08) 1px, transparent 1px);
        background-size: 100% 20px, 20px 100%;
        opacity: 0.45;
        mask-image: linear-gradient(to top, rgba(0, 0, 0, 0.9), transparent);
        z-index: 1;
      }

      .airbag-stage-figure {
        position: relative;
        z-index: 3;
        width: min(84vw, 320px);
        aspect-ratio: 0.76;
        display: grid;
        place-items: center;
        transform: translateY(10px);
      }

      .airbag-stage-person {
        position: relative;
        z-index: 4;
        width: 52%;
        height: 100%;
        transform-origin: center bottom;
      }

      .airbag-head {
        position: absolute;
        top: 0;
        left: 50%;
        width: 28%;
        aspect-ratio: 1;
        transform: translateX(-50%);
        border-radius: 50%;
        background: linear-gradient(145deg, #ffffff, #dbe3e3);
        box-shadow: inset -10px -10px 18px rgba(0, 0, 0, 0.08), 0 8px 18px rgba(0, 0, 0, 0.16);
      }

      .airbag-body {
        position: absolute;
        top: 24%;
        left: 50%;
        width: 36%;
        height: 44%;
        transform: translateX(-50%);
        border-radius: 22px 22px 38px 38px;
        background: linear-gradient(180deg, #d9fffd 0%, #c9f3f0 100%);
        box-shadow: inset -10px -10px 24px rgba(0, 0, 0, 0.06), 0 8px 20px rgba(0, 0, 0, 0.12);
      }

      .airbag-arm {
        position: absolute;
        top: 34%;
        width: 32%;
        height: 4%;
        border-radius: 999px;
        background: linear-gradient(90deg, #9df0e1, #74e1d5);
        transform-origin: center;
      }

      .airbag-arm.left {
        left: 1%;
        transform: rotate(24deg);
      }

      .airbag-arm.right {
        right: 1%;
        transform: rotate(-24deg);
      }

      .airbag-leg {
        position: absolute;
        top: 64%;
        width: 4.5%;
        height: 26%;
        border-radius: 999px;
        background: linear-gradient(180deg, #9ff1e2, #71e0d4);
        transform-origin: top center;
      }

      .airbag-leg.left {
        left: 41%;
        transform: rotate(10deg);
      }

      .airbag-leg.right {
        right: 41%;
        transform: rotate(-10deg);
      }

      .airbag-shell {
        position: absolute;
        inset: 10% 12% 18%;
        border-radius: 48% 48% 42% 42%;
        display: grid;
        place-items: center;
        pointer-events: none;
        z-index: 2;
      }

      .airbag-layer {
        position: absolute;
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(230, 235, 235, 0.98));
        box-shadow: inset -10px -10px 18px rgba(0, 0, 0, 0.06), 0 8px 18px rgba(0, 0, 0, 0.12);
        transform-origin: center;
        opacity: 0;
      }

      .airbag-layer.top {
        top: 6%;
        left: 50%;
        width: 34%;
        height: 22%;
        transform: translateX(-50%) scale(var(--bag-scale, 0.01));
        opacity: var(--bag-opacity, 0);
      }

      .airbag-layer.left-top {
        top: 24%;
        left: 10%;
        width: 20%;
        height: 18%;
        transform: rotate(-20deg) scale(var(--bag-scale, 0.01));
        opacity: calc(var(--bag-opacity, 0) * 0.92);
      }

      .airbag-layer.right-top {
        top: 24%;
        right: 10%;
        width: 20%;
        height: 18%;
        transform: rotate(20deg) scale(var(--bag-scale, 0.01));
        opacity: calc(var(--bag-opacity, 0) * 0.92);
      }

      .airbag-layer.left-mid {
        top: 42%;
        left: 3%;
        width: 18%;
        height: 24%;
        transform: rotate(1deg) scale(var(--bag-scale, 0.01));
        opacity: calc(var(--bag-opacity, 0) * 0.95);
      }

      .airbag-layer.right-mid {
        top: 42%;
        right: 3%;
        width: 18%;
        height: 24%;
        transform: rotate(-1deg) scale(var(--bag-scale, 0.01));
        opacity: calc(var(--bag-opacity, 0) * 0.95);
      }

      .airbag-layer.bottom {
        bottom: 6%;
        left: 50%;
        width: 34%;
        height: 22%;
        transform: translateX(-50%) scale(var(--bag-scale, 0.01));
        opacity: var(--bag-opacity, 0);
      }

      .airbag-stage-view[data-stage="Normal"] .airbag-stage-person {
        transform: translateY(0) rotate(0deg);
      }

      .airbag-stage-view[data-stage="Freefall"] .airbag-stage-person {
        transform: translateY(5px) rotate(4deg);
      }

      .airbag-stage-view[data-stage="Impact"] .airbag-stage-person {
        transform: translateY(9px) rotate(-2deg);
      }

      .airbag-stage-view[data-stage="Deploy"] .airbag-stage-person {
        transform: translateY(12px) rotate(0deg) scale(0.98);
      }

      .airbag-stage-view[data-stage="Normal"] .airbag-shell {
        --bag-scale: 0.01;
        --bag-opacity: 0;
      }

      .airbag-stage-view[data-stage="Freefall"] .airbag-shell {
        --bag-scale: 0.28;
        --bag-opacity: 0.38;
      }

      .airbag-stage-view[data-stage="Impact"] .airbag-shell {
        --bag-scale: 0.78;
        --bag-opacity: 0.82;
      }

      .airbag-stage-view[data-stage="Deploy"] .airbag-shell {
        --bag-scale: 1;
        --bag-opacity: 1;
      }

      .airbag-stage-view[data-mode="connected"] .airbag-layer,
      .airbag-stage-view[data-mode="connected"] .airbag-head,
      .airbag-stage-view[data-mode="connected"] .airbag-body,
      .airbag-stage-view[data-mode="connected"] .airbag-arm,
      .airbag-stage-view[data-mode="connected"] .airbag-leg {
        transition: transform 900ms ease, opacity 900ms ease, box-shadow 900ms ease, filter 900ms ease;
      }

      .airbag-stage-view[data-mode="offline"] .airbag-layer,
      .airbag-stage-view[data-mode="offline"] .airbag-head,
      .airbag-stage-view[data-mode="offline"] .airbag-body,
      .airbag-stage-view[data-mode="offline"] .airbag-arm,
      .airbag-stage-view[data-mode="offline"] .airbag-leg,
      .airbag-stage-view[data-mode="offline"] .airbag-stage-person {
        transition: none;
      }

      .airbag-stage-view[data-mode="offline"] {
        background:
          linear-gradient(180deg, rgba(7, 19, 21, 0.18), rgba(7, 19, 21, 0.34)),
          radial-gradient(circle at 50% 18%, rgba(98, 241, 210, 0.09), transparent 34%);
      }

      .airbag-stage-view::after {
        content: "";
      }

      .airbag-visual-shell canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .section-note {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.5;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .field-grid.three-col {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .field input,
      .field select,
      .field textarea {
        width: 100%;
        border: 1px solid rgba(148, 237, 218, 0.14);
        border-radius: 10px;
        background: rgba(7, 19, 21, 0.46);
        color: var(--text);
        padding: 10px 12px;
        outline: none;
        font: inherit;
      }

      .field textarea {
        min-height: 92px;
        resize: vertical;
      }

      .editable-card .card-header {
        align-items: center;
      }

      .card-actions {
        margin-left: auto;
      }

      .edit-toggle {
        width: 34px;
        height: 34px;
        border: 1px solid rgba(98, 241, 210, 0.26);
        border-radius: 10px;
        background: rgba(98, 241, 210, 0.1);
        color: var(--text);
        cursor: pointer;
      }

      .app-shell {
        display: grid;
        grid-template-columns: 280px minmax(0, 1fr);
        min-height: 100vh;
      }

      .app-shell.sidebar-collapsed {
        grid-template-columns: 92px minmax(0, 1fr);
      }

      .sidebar {
        position: sticky;
        top: 0;
        height: 100vh;
        padding: 24px 18px;
        border-right: 1px solid var(--line);
        background: rgba(7, 19, 21, 0.84);
        backdrop-filter: blur(24px);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
      }

      .sidebar.collapsed {
        padding: 18px 12px;
      }

      .sidebar.collapsed .brand {
        justify-content: center;
        padding-bottom: 18px;
      }

      .sidebar.collapsed .brand > div:last-child,
      .sidebar.collapsed .footer-label,
      .sidebar.collapsed .footer-note,
      .sidebar.collapsed .nav-button span:last-child {
        display: none;
      }

      .sidebar.collapsed .nav-button {
        justify-content: center;
        padding: 0;
      }

      .sidebar.collapsed .nav-icon {
        width: auto;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 6px 26px;
        cursor: pointer;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(98, 241, 210, 0.38);
        border-radius: 8px;
        background: linear-gradient(135deg, rgba(98, 241, 210, 0.22), rgba(19, 184, 166, 0.06));
        box-shadow: 0 0 36px rgba(98, 241, 210, 0.12);
      }

      .pulse-ring {
        width: 18px;
        height: 18px;
        border: 3px solid var(--mint);
        border-radius: 50%;
        position: relative;
      }

      .pulse-ring::after {
        content: "";
        position: absolute;
        inset: 3px;
        background: var(--mint);
        border-radius: 50%;
      }

      .brand-title {
        margin: 0;
        font-size: 15px;
        font-weight: 780;
      }

      .brand-subtitle {
        margin: 3px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      .nav {
        display: grid;
        gap: 6px;
        min-height: 0;
      }

      .nav-button {
        width: 100%;
        min-height: 42px;
        border: 1px solid transparent;
        border-radius: var(--radius);
        background: transparent;
        color: var(--soft);
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 12px;
        cursor: pointer;
        text-align: left;
      }

      .nav-button:hover,
      .nav-button.active {
        border-color: rgba(98, 241, 210, 0.24);
        background: rgba(98, 241, 210, 0.08);
        color: var(--text);
      }

      .nav-icon {
        width: 24px;
        height: 24px;
        display: grid;
        place-items: center;
        color: var(--mint);
        font-size: 15px;
      }

      .sidebar-footer {
        margin-top: auto;
        padding-top: 18px;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: rgba(18, 40, 43, 0.72);
      }

      .footer-label {
        margin: 0;
        font-size: 12px;
        color: var(--muted);
      }

      .footer-value {
        margin: 6px 0 0;
        font-weight: 760;
      }

      .main {
        min-width: 0;
        padding: 26px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        margin-bottom: 20px;
      }

      .eyebrow {
        color: var(--mint);
        font-size: 12px;
        text-transform: uppercase;
        font-weight: 780;
      }

      h1 {
        margin: 6px 0 0;
        font-size: clamp(28px, 4vw, 46px);
        line-height: 1.05;
        letter-spacing: 0;
      }

      .topbar-copy {
        margin: 10px 0 0;
        max-width: 740px;
        color: var(--muted);
        line-height: 1.6;
      }

      .topbar-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      .button {
        min-height: 42px;
        border: 1px solid rgba(98, 241, 210, 0.26);
        border-radius: var(--radius);
        color: var(--text);
        background: rgba(98, 241, 210, 0.08);
        padding: 0 14px;
        cursor: pointer;
      }

      .button.primary {
        border-color: transparent;
        color: #04211d;
        background: linear-gradient(135deg, var(--mint), var(--teal));
        font-weight: 800;
      }

      .dashboard-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.4fr) minmax(320px, 0.8fr);
        gap: 18px;
      }

      .section-grid {
        display: grid;
        gap: 18px;
      }

      .card {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: linear-gradient(180deg, rgba(18, 40, 43, 0.92), rgba(12, 28, 31, 0.92));
        box-shadow: var(--shadow);
      }

      .card-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        padding: 18px 18px 0;
      }

      .card-title {
        margin: 0;
        font-size: 16px;
        font-weight: 800;
      }

      .card-subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .card-body {
        padding: 18px;
      }

      .status-card {
        min-height: 326px;
        position: relative;
        overflow: hidden;
      }

      .status-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 210px;
        gap: 22px;
        align-items: center;
      }

      .status-label {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        min-height: 34px;
        border: 1px solid rgba(98, 241, 210, 0.28);
        border-radius: 999px;
        padding: 0 12px;
        color: var(--mint);
        background: rgba(98, 241, 210, 0.08);
        font-size: 13px;
        font-weight: 800;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;

      function getStageFromPayload(payload) {
        const stage = String(payload?.stage || "").trim();
        if (stage) {
          return stage;
        }

        const mode = String(payload?.mode || "").trim().toUpperCase();
        if (mode in stateMachineToStage) {
          return stateMachineToStage[mode];
        }

        const action = String(payload?.currentAction || "").toLowerCase();
        if (action.includes("sos")) return "SOS";
        if (action.includes("impact")) return "Impact";
        if (action.includes("fall") || action.includes("freefall") || action.includes("alarm")) return "Fall";

        return "Normal";
      }

      function getToneForStage(stage) {
        return stageTone[stage] || "ok";
      }

      function getAirbagStage(stageValue, modeValue) {
        const mode = String(modeValue || "").toUpperCase();
        if (mode === "SOS SENT" || mode === "PRE ALARM") return "Deploy";
        if (mode === "IMPACT") return "Impact";
        if (mode === "FREEFALL") return "Freefall";
        if (mode === "NORMAL") return "Normal";

        const raw = String(stageValue || "").toUpperCase();
        if (raw.includes("SOS")) return "Deploy";
        if (raw.includes("IMPACT")) return "Impact";
        if (raw.includes("FALL") || raw.includes("FREEFALL") || raw.includes("PRE ALARM") || raw === "DROP" || raw === "ALRM") return "Freefall";

        return Number.isFinite(numeric) ? numeric.toFixed(digits) : (0).toFixed(digits);

              const height = container.clientHeight || 1;
              renderer.setSize(width, height, false);
              camera.aspect = width / height;
              camera.updateProjectionMatrix();
            };

            handleResize = () => resize();
            if (window.ResizeObserver) {
              resizeObserver = new ResizeObserver(resize);
              resizeObserver.observe(container);
            } else {
              window.addEventListener("resize", handleResize);
            }
            resize();

            const lerp = (a, b, t) => a + (b - a) * t;
            const poseByStage = {
              Normal: { tilt: 0, lift: 0, sway: 0.02, squish: 0.0 },
              Freefall: { tilt: 0.14, lift: -0.04, sway: 0.04, squish: 0.05 },
              Impact: { tilt: -0.06, lift: -0.08, sway: 0.02, squish: 0.14 },
              Deploy: { tilt: 0.0, lift: -0.02, sway: 0.01, squish: 0.1 },
            };

            const animate = (time) => {
              const targetProgress = targetProgressRef.current;
              if (connectedRef.current) {
                const rate = targetProgress < currentProgressRef.current ? 0.03 : 0.1;
                currentProgressRef.current = lerp(currentProgressRef.current, targetProgress, rate);
              } else {
                currentProgressRef.current = targetProgress;
              }

              const p = currentProgressRef.current;
              const pose = poseByStage[stageRef.current] || poseByStage.Normal;

              root.rotation.y = 0.08 * Math.sin(time / 2600);
              root.rotation.x = 0.01;
              avatar.rotation.z = lerp(avatar.rotation.z, pose.tilt, connectedRef.current ? 0.08 : 1);
              avatar.position.y = lerp(avatar.position.y, -0.16 + pose.lift, connectedRef.current ? 0.08 : 1);
              avatar.position.x = 0.02 * Math.sin(time / 1800) * pose.sway;

              torso.scale.set(1, 1 - pose.squish * 0.12 * p, 1);
              head.scale.setScalar(1 - pose.squish * 0.04 * p);
              chestGlow.scale.setScalar(1 + p * 0.04);

              armL.rotation.z = 1.14 - p * 0.08;
              armR.rotation.z = -1.14 + p * 0.08;
              handL.position.set(-1.12 + p * 0.05, 0.19 - p * 0.02, 0.13);
              handR.position.set(1.12 - p * 0.05, 0.19 - p * 0.02, 0.13);
              legL.rotation.z = 0.06 + p * 0.02;
              legR.rotation.z = -0.06 - p * 0.02;
              legL.position.y = -1.14 - p * 0.02;
              legR.position.y = -1.14 - p * 0.02;
              footL.position.y = -1.74 - p * 0.01;
              footR.position.y = -1.74 - p * 0.01;

              const bagOpacity = 0.18 + p * 0.82;
              bagGroup.visible = true;
              bagParts.forEach((part, index) => {
                const { mesh, basePosition, baseScale, opacity } = part;
                const swell = index === 7 ? 0.45 + p * 1.15 : 0.22 + p * 0.92;
                const xBias = basePosition[0] * (0.78 + p * 0.22);
                const yBias = basePosition[1] + (index === 7 ? p * 0.06 : 0);
                mesh.position.set(xBias, yBias, basePosition[2]);
                mesh.scale.setScalar(baseScale * swell);
                mesh.material.opacity = bagOpacity * opacity;
              });

              renderer.render(scene, camera);
              frameId = window.requestAnimationFrame(animate);
            };

            frameId = window.requestAnimationFrame(animate);

            sceneRef.current = { scene, camera, renderer, resizeObserver, frameId, container };
          } catch (error) {
            console.error("Airbag scene failed to start", error);
            setThreeReady(false);
            if (renderer) {
              renderer.dispose();
            }
            return undefined;
          }

          return () => {
            if (resizeObserver) {
              resizeObserver.disconnect();
            } else if (handleResize) {
              window.removeEventListener("resize", handleResize);
            }
            window.cancelAnimationFrame(frameId);
            if (renderer) {
              renderer.dispose();
              if (container.contains(renderer.domElement)) {
                container.removeChild(renderer.domElement);
              }
            }
            sceneRef.current = null;
          };
        }, []);

        return (
          <div className="airbag-panel" data-mode={connected ? "connected" : "offline"}>
            <div
              className="airbag-stage-view"
              data-stage={stageKey}
              data-mode={connected ? "connected" : "offline"}
            >
              <div className="airbag-grid"></div>
              {!connected && (
                <div className="airbag-static-host" aria-hidden="true">
                  {!imageFailed ? (
                    <img
                      className="airbag-stage-image"
                      src={imageSrc}
                      alt=""
                      onError={() => setImageFailed(true)}
                    />
                  ) : (
                    <div className="airbag-stage-figure">
                      <div className="airbag-stage-person">
                        <div className="airbag-head"></div>
                        <div className="airbag-body"></div>
                        <div className="airbag-arm left"></div>
                        <div className="airbag-arm right"></div>
                        <div className="airbag-leg left"></div>
                        <div className="airbag-leg right"></div>
                        <div className="airbag-shell">
                          <div className="airbag-layer top"></div>
                          <div className="airbag-layer left-top"></div>
                          <div className="airbag-layer right-top"></div>
                          <div className="airbag-layer left-mid"></div>
                          <div className="airbag-layer right-mid"></div>
                          <div className="airbag-layer bottom"></div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}
              {connected && !threeReady && (
                <div className="airbag-fallback-scene" aria-hidden="true">
                  <div className="airbag-stage-figure">
                    <div className="airbag-stage-person">
                      <div className="airbag-head"></div>
                      <div className="airbag-body"></div>
                      <div className="airbag-arm left"></div>
                      <div className="airbag-arm right"></div>
                      <div className="airbag-leg left"></div>
                      <div className="airbag-leg right"></div>
                      <div className="airbag-shell">
                        <div className="airbag-layer top"></div>
                        <div className="airbag-layer left-top"></div>
                        <div className="airbag-layer right-top"></div>
                        <div className="airbag-layer left-mid"></div>
                        <div className="airbag-layer right-mid"></div>
                        <div className="airbag-layer bottom"></div>
                      </div>
                    </div>
                  </div>
                </div>
              )}
              {connected && <div ref={mountRef} className="airbag-three-host" aria-hidden={threeReady ? "false" : "true"}></div>}
            </div>
          </div>
        );
      }

      function App() {
        const [active, setActive] = useState("overview");
        const [mode, setMode] = useState("NORMAL");
        const [seconds, setSeconds] = useState(10);
        const [buzzerEnabled, setBuzzerEnabled] = useState(true);
        const [ledEnabled, setLedEnabled] = useState(true);
        const [simulationEnabled, setSimulationEnabled] = useState(true);
        const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
        const [overviewData, setOverviewData] = useState({
          deviceName: "ESP32-C3 Wearable",
          deviceStatus: "Simulated Offline",
          battery: 87,
          currentAction: "Normal",
        });
        const [profileData, setProfileData] = useState({
          name: "Aarav Mehta",
          age: "68",
          bloodGroup: "B+",
          emergencyContact: "+91 98765 43210",
          medicalNotes: "Fall risk, lives alone",
          deviceAssignedId: "FALL-C3-001",
        });
        const [settingsData, setSettingsData] = useState({
          freefallThreshold: "0.4",
          impactThreshold: "2.5",
          preAlarmDuration: "10",
          sampleInterval: "50",
        });
        const [projectData, setProjectData] = useState({
          board: "ESP32-C3 Super Mini",
          sensor: "MPU-9250 sensor",
          buzzer: "Active-low buzzer",
          mode: "Offline mode",
          i2cPins: "GPIO 8 / GPIO 9",
          calibrationStatus: "Pending / local demo",
        });
        const [analyticsData, setAnalyticsData] = useState({
          totalFalls: "03",
          falseAlarms: "01",
          averageImpact: "2.82",
          monitoringUptime: "96",
          dailyActivity: "78",
          weeklySafety: "92",
        });
        const [alertData, setAlertData] = useState({
          emergencyContact: "Primary caregiver placeholder",
          responseNote: "Call if SOS stays active for 60 seconds",
          testMode: "Local alarm and log only",
        });
        const [editMode, setEditMode] = useState({
          overview: false,
          live: false,
          alert: false,
          profile: false,
          analytics: false,
          settings: false,
          project: false,
        });
        const [draftOverview, setDraftOverview] = useState(null);
        const [draftSensor, setDraftSensor] = useState(null);
        const [draftAlert, setDraftAlert] = useState(null);
        const [draftProfile, setDraftProfile] = useState(null);
        const [draftAnalytics, setDraftAnalytics] = useState(null);
        const [draftSettings, setDraftSettings] = useState(null);
        const [draftProject, setDraftProject] = useState(null);
        const [events, setEvents] = useState(initialEvents);
        const [liveEvents, setLiveEvents] = useState([]);
        const [displayStage, setDisplayStage] = useState("Normal");
        const [sensor, setSensor] = useState({
          ax: 0.04,
          ay: 0.98,
          az: 0.13,
          gx: 0.02,
          gy: 0.04,
          gz: 0.01,
          magnitude: 1.01,
          gyroMagnitude: 0.05,
          pitch: 4.7,
          battery: 87,
          uptime: 96,
        });
        const [history, setHistory] = useState(
          Array.from({ length: 28 }, (_, index) => 38 + Math.sin(index / 2) * 16 + Math.random() * 10)
        );
        const [liveAnalyticsData, setLiveAnalyticsData] = useState(createLiveAnalyticsData());
        const liveStageRef = useRef(null);
        const liveStatsRef = useRef({
          sampleCount: 0,
          normalCount: 0,
          fallCount: 0,
          impactCount: 0,
          sosCount: 0,
          totalMagnitude: 0,
          impactMagnitude: 0,
          falseAlarms: 0,
          lastAlertStage: null,
          lastConnected: null,
        });
        const eventSourceRef = useRef(null);

        const currentPage = pageMeta[active] || pageMeta.overview;
        const connectedMode = !simulationEnabled;
        const connectionLabel = connectedMode ? "Connected" : "Simulated Connection";
        const timelineEvents = simulationEnabled ? events : liveEvents;
        const analyticsViewData = simulationEnabled ? analyticsData : liveAnalyticsData;

        const stateTheme = useMemo(() => {
          if (mode === "SOS SENT") return { color: "var(--red)", label: "SOS triggered", copy: "Emergency alarm is active. Buzzer and LED are locked on until the wearer cancels it." };
          if (mode === "PRE ALARM") return { color: "var(--yellow)", label: "Pre-alarm", copy: "A fall pattern was confirmed. The wearer has a short cancellation window before SOS mode." };
          if (mode === "IMPACT") return { color: "var(--orange)", label: "Impact detected", copy: "High G-force was recorded after possible freefall. The system is validating the event." };
          if (mode === "FREEFALL") return { color: "var(--cyan)", label: "Freefall detected", copy: "Acceleration dropped below the configured threshold. Waiting for impact confirmation." };
          return {
            color: "var(--mint)",
            label: "Normal",
            copy: simulationEnabled
              ? "The wearable is monitoring motion in offline simulation mode. No active emergency is detected."
              : "The wearable is connected to the board and reflecting live device state.",
          };
        }, [mode, simulationEnabled]);

        useEffect(() => {
          if (!simulationEnabled) {
            return undefined;
          }

          const timer = setInterval(() => {
            setSensor((prev) => {
              const nextAx = Math.sin(Date.now() / 900) * 0.08 + Math.random() * 0.03;
              const nextAy = 0.96 + Math.cos(Date.now() / 1200) * 0.05;
              const nextAz = 0.12 + Math.sin(Date.now() / 1500) * 0.06;
              const nextGx = Math.sin(Date.now() / 1100) * 0.22;
              const nextGy = Math.cos(Date.now() / 1300) * 0.18;
              const nextGz = Math.sin(Date.now() / 1700) * 0.14;
              const magnitude = Math.sqrt(nextAx * nextAx + nextAy * nextAy + nextAz * nextAz);
              const gyroMagnitude = Math.sqrt(nextGx * nextGx + nextGy * nextGy + nextGz * nextGz);
              return {
                ax: nextAx,
                ay: nextAy,
                az: nextAz,
                gx: nextGx,
                gy: nextGy,
                gz: nextGz,
                magnitude,
                gyroMagnitude,
                pitch: 4.4 + Math.sin(Date.now() / 1700) * 3.2,
                battery: clamp(prev.battery - 0.02, 71, 100),
                uptime: clamp(prev.uptime + 0.01, 0, 100),
              };
            });

            setHistory((prev) => {
              const next = [...prev.slice(1), 38 + Math.random() * 42 + Math.sin(Date.now() / 700) * 12];
              return next;
            });

            setSeconds((prev) => (mode === "PRE ALARM" ? Math.max(0, prev - 1) : 10));
          }, 1000);

          return () => clearInterval(timer);
        }, [mode, simulationEnabled]);

        useEffect(() => {
          if (simulationEnabled) {
            setDisplayStage(modeToStateLabel[mode] || "Normal");
            liveStageRef.current = null;
            liveStatsRef.current = {
              sampleCount: 0,
              normalCount: 0,
              fallCount: 0,
              impactCount: 0,
              sosCount: 0,
              totalMagnitude: 0,
              impactMagnitude: 0,
              falseAlarms: 0,
              lastAlertStage: null,
              lastConnected: null,
            };
            setLiveEvents([]);
            setLiveAnalyticsData(createLiveAnalyticsData());
            return undefined;
          }

          let cancelled = false;
          const source = new EventSource(`${backendBaseUrl}/events`);
          eventSourceRef.current = source;

          function ingestPayload(payload) {
            if (cancelled || !payload) {
              return;
            }

            const nextMode = payload.mode || "NORMAL";
            const nextAction = payload.currentAction || modeToStateLabel[nextMode] || "Normal";
            const nextStage = getStageFromPayload(payload);
            const connected = payload.connected !== false;
            const battery = Number.isFinite(Number(payload.battery)) ? Number(payload.battery) : null;

            setMode(nextMode);
            setOverviewData((prev) => ({
              ...prev,
              deviceStatus: connectionLabel,
              battery: battery !== null ? clamp(battery, 0, 100) : prev.battery,
              currentAction: nextAction,
            }));
            setDisplayStage(nextStage);
            setSensor((prev) => ({
              ...prev,
              ax: Number.isFinite(Number(payload.ax)) ? Number(payload.ax) : prev.ax,
              ay: Number.isFinite(Number(payload.ay)) ? Number(payload.ay) : prev.ay,
              az: Number.isFinite(Number(payload.az)) ? Number(payload.az) : prev.az,
              gx: Number.isFinite(Number(payload.gx)) ? Number(payload.gx) : prev.gx,
              gy: Number.isFinite(Number(payload.gy)) ? Number(payload.gy) : prev.gy,
              gz: Number.isFinite(Number(payload.gz)) ? Number(payload.gz) : prev.gz,
              magnitude: Number.isFinite(Number(payload.magnitude)) ? Number(payload.magnitude) : prev.magnitude,
              gyroMagnitude: Number.isFinite(Number(payload.gyroMagnitude)) ? Number(payload.gyroMagnitude) : prev.gyroMagnitude,
              pitch: Number.isFinite(Number(payload.pitch)) ? Number(payload.pitch) : prev.pitch,
              battery: battery !== null ? clamp(battery, 0, 100) : prev.battery,
            }));

            setHistory((prev) => {
              const nextValue = Number.isFinite(Number(payload.magnitude)) ? Number(payload.magnitude) * 20 : prev[prev.length - 1];
              return [...prev.slice(1), clamp(nextValue, 10, 96)];
            });

            const stats = liveStatsRef.current;
            stats.sampleCount += 1;
            stats.lastConnected = connected;
            stats.totalMagnitude += Number.isFinite(Number(payload.magnitude)) ? Number(payload.magnitude) : 0;
            if (nextStage === "Normal") {
              stats.normalCount += 1;
            }
            if (nextStage === "Fall") {
              stats.fallCount += 1;
            }
            if (nextStage === "Impact") {
              stats.impactCount += 1;
              stats.impactMagnitude += Number.isFinite(Number(payload.magnitude)) ? Number(payload.magnitude) : 0;
            }
            if (nextStage === "SOS") {
              stats.sosCount += 1;
              stats.impactMagnitude += Number.isFinite(Number(payload.magnitude)) ? Number(payload.magnitude) : 0;
            }
            if (liveStageRef.current !== "Normal" && nextStage === "Normal" && stats.lastAlertStage && stats.lastAlertStage !== "SOS") {
              stats.falseAlarms += 1;
            }
            if (nextStage !== liveStageRef.current) {
              const now = new Date();
              const clock = now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
              setLiveEvents((prev) => [
                {
                  title: `${nextStage} stage`,
                  meta: `${clock} · ${payload.currentAction || nextMode} · ax ${formatNumber(payload.ax)} ay ${formatNumber(payload.ay)} az ${formatNumber(payload.az)} gx ${formatNumber(payload.gx)} gy ${formatNumber(payload.gy)} gz ${formatNumber(payload.gz)}`,
                  tone: getToneForStage(nextStage),
                  tag: nextStage,
                },
                ...prev.slice(0, 5),
              ]);
              if (nextStage !== "Normal") {
                stats.lastAlertStage = nextStage;
              } else {
                stats.lastAlertStage = null;
              }
              liveStageRef.current = nextStage;
            }

            const totalEvents = stats.normalCount + stats.fallCount + stats.impactCount + stats.sosCount;
            const motionShare = totalEvents ? ((stats.fallCount + stats.impactCount + stats.sosCount) / totalEvents) * 100 : 0;
            const impactAverage = stats.impactCount + stats.sosCount
              ? stats.impactMagnitude / (stats.impactCount + stats.sosCount)
              : 0;
            const safetyScore = clamp(
              100 - stats.fallCount * 3 - stats.impactCount * 8 - stats.sosCount * 15 - stats.falseAlarms * 2,
              0,
              100
            );
            const uptime = connected ? 100 : 0;

            setLiveAnalyticsData({
              totalFalls: String(stats.fallCount + stats.impactCount + stats.sosCount).padStart(2, "0"),
              falseAlarms: String(stats.falseAlarms).padStart(2, "0"),
              averageImpact: formatNumber(impactAverage),
              monitoringUptime: String(Math.round(uptime)),
              dailyActivity: String(Math.round(motionShare)),
              weeklySafety: String(Math.round(safetyScore)),
            });
          }

          source.onmessage = (event) => {
            try {
              ingestPayload(JSON.parse(event.data));
            } catch (error) {
              console.error("Failed to parse live dashboard event", error);
            }
          };

          source.onerror = () => {
            if (!cancelled) {
              setOverviewData((prev) => ({ ...prev, deviceStatus: connectionLabel }));
            }
          };

          const pollLatest = () => {
            fetch(`${backendBaseUrl}/api/status`)
              .then((response) => response.json())
              .then((payload) => ingestPayload(payload))
              .catch(() => {});
          };

          pollLatest();
          const pollTimer = setInterval(pollLatest, 1000);

          return () => {
            cancelled = true;
            source.close();
            clearInterval(pollTimer);
            eventSourceRef.current = null;
          };
        }, [simulationEnabled, connectionLabel]);

        useEffect(() => {
          if (simulationEnabled) {
            setDisplayStage(modeToStateLabel[mode] || "Normal");
          }
        }, [mode, simulationEnabled]);

        function syncAirbagViz(stageValue, modeValue, sensorValue, batteryValue) {
          const vizState = {
            stage: stageValue,
            visualStage: getAirbagStage(stageValue, modeValue),
            mode: modeValue,
            connected: connectedMode,
            simulationEnabled,
            magnitude: Number(sensorValue?.magnitude) || 0,
            gyroMagnitude: Number(sensorValue?.gyroMagnitude) || 0,
            pitch: Number(sensorValue?.pitch) || 0,
            battery: Number(batteryValue) || 0,
          };

          window.__fallGuardVizState = vizState;
          let stateNode = document.getElementById("airbag-viz-state");
          if (!stateNode) {
            stateNode = document.createElement("div");
            stateNode.id = "airbag-viz-state";
            stateNode.hidden = true;
            document.body.appendChild(stateNode);
          }

          stateNode.dataset.stage = String(vizState.stage || "");
          stateNode.dataset.visualStage = String(vizState.visualStage || "");
          stateNode.dataset.mode = String(vizState.mode || "");
          stateNode.dataset.connected = String(Boolean(vizState.connected));
          stateNode.dataset.simulationEnabled = String(Boolean(vizState.simulationEnabled));
          stateNode.dataset.magnitude = String(vizState.magnitude || 0);
          stateNode.dataset.gyroMagnitude = String(vizState.gyroMagnitude || 0);
          stateNode.dataset.pitch = String(vizState.pitch || 0);
          stateNode.dataset.battery = String(vizState.battery || 0);

          window.dispatchEvent(new CustomEvent("fallguard-viz-state", { detail: vizState }));
        }

        useEffect(() => {
          syncAirbagViz(displayStage, mode, sensor, overviewData.battery);
        }, [displayStage, mode, connectedMode, simulationEnabled, sensor.magnitude, sensor.gyroMagnitude, sensor.pitch, overviewData.battery]);

        useEffect(() => {
          if (mode === "PRE ALARM" && seconds === 0) {
            setMode("SOS SENT");
            addEvent("SOS SENT");
          }
        }, [mode, seconds]);

        useEffect(() => {
          setOverviewData((prev) => ({ ...prev, currentAction: modeToStateLabel[mode] || "Normal" }));
        }, [mode]);

        function addEvent(nextMode) {
          const now = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
          const tone = nextMode === "SOS SENT" ? "danger" : nextMode === "NORMAL" ? "ok" : "warn";
          setEvents((prev) => [
            {
              title: `${nextMode} state selected`,
              meta: `${now} · Demo value generated locally`,
              tone,
              tag: nextMode,
            },
            ...prev.slice(0, 5),
          ]);
        }

        function setDemoState(nextMode) {
          setMode(nextMode);
          setSeconds(10);
          syncAirbagViz(modeToStateLabel[nextMode] || "Normal", nextMode, sensor, overviewData.battery);
          addEvent(nextMode);
        }

        function cancelFalseAlarm() {
          setMode("NORMAL");
          setSeconds(10);
          syncAirbagViz("Normal", "NORMAL", sensor, overviewData.battery);
          const now = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
          setEvents((prev) => [
            {
              title: "False alarm cancelled",
              meta: `${now} · Wearer confirmed they are safe`,
              tone: "ok",
              tag: "Cancelled",
            },
            ...prev.slice(0, 5),
          ]);
        }

        function handleNav(item) {
          setActive(item.target);
        }

        function setOverviewAction(nextLabel) {
          setOverviewData((prev) => ({ ...prev, currentAction: nextLabel }));
          const nextMode = stateLabelToMode[nextLabel];
          if (nextMode) {
            setDemoState(nextMode);
          }
        }

        function beginEdit(section) {
          if (section === "overview") setDraftOverview({ ...overviewData });
          if (section === "live") setDraftSensor({ ...sensor });
          if (section === "alert") setDraftAlert({ ...alertData });
          if (section === "profile") setDraftProfile({ ...profileData });
          if (section === "analytics") setDraftAnalytics({ ...analyticsData });
          if (section === "settings") setDraftSettings({ ...settingsData });
          if (section === "project") setDraftProject({ ...projectData });
          setEditMode((prev) => ({ ...prev, [section]: true }));
        }

        function cancelEdit(section) {
          if (section === "overview") setDraftOverview(null);
          if (section === "live") setDraftSensor(null);
          if (section === "alert") setDraftAlert(null);
          if (section === "profile") setDraftProfile(null);
          if (section === "analytics") setDraftAnalytics(null);
          if (section === "settings") setDraftSettings(null);
          if (section === "project") setDraftProject(null);
          setEditMode((prev) => ({ ...prev, [section]: false }));
        }

        function saveEdit(section) {
          if (section === "overview" && draftOverview) {
            setOverviewData(draftOverview);
            const nextMode = stateLabelToMode[draftOverview.currentAction];
            if (nextMode) {
              setMode(nextMode);
            }
          }
          if (section === "live" && draftSensor) setSensor(draftSensor);
          if (section === "alert" && draftAlert) setAlertData(draftAlert);
          if (section === "profile" && draftProfile) setProfileData(draftProfile);
          if (section === "analytics" && draftAnalytics) setAnalyticsData(draftAnalytics);
          if (section === "settings" && draftSettings) setSettingsData(draftSettings);
          if (section === "project" && draftProject) setProjectData(draftProject);
          cancelEdit(section);
        }

        function renderPageContent() {
          if (active === "overview") {
            return (
              <div className="page-stack">
                <section className="card status-card editable-card" id="overview">
                  <div className="card-header">
                    <div>
                      <h3 className="card-title">Overview</h3>
                      <p className="card-subtitle">Device state, battery charge, current state, and connection status in one view.</p>
                    </div>
                    <span className="badge">Overview</span>
                  </div>
                  <div className="card-body">
                    <div>
                      <span className="status-label" style={{ color: stateTheme.color }}>
                        <span className="dot"></span>

                    <InfoRow label="Sensor health" value="MPU-9250 OK" />
                    <InfoRow label="Connection" value={connectionLabel} />
                    <InfoRow label="Battery" value={`${overviewData.battery}%`} />
                    <InfoRow label="Last sync" value={simulationEnabled ? "Local only" : "Live board"} />
                    <InfoRow label="Firmware" value="v0.1-demo" />
                  </div>
                </section>
              </div>
            );
          }

          return null;
        }

        const showEmergencyActions = active === "fall-events" && simulationEnabled;

        return (
          <div className={`app-shell ${sidebarCollapsed ? "sidebar-collapsed" : ""}`}>
            <aside className={`sidebar ${sidebarCollapsed ? "collapsed" : ""}`}>
              <div className="brand" onClick={() => setSidebarCollapsed((value) => !value)} title="Toggle sidebar">
                <div className="brand-mark">
                  <div className="pulse-ring"></div>
                </div>
                <div>
                  <p className="brand-title">FallGuard C3</p>
                  <p className="brand-subtitle">Wearable safety monitor</p>
                </div>
              </div>

              <nav className="nav">
                {navItems.map((item) => (
                  <button
                    key={item.label}
                    type="button"
                    className={`nav-button ${active === item.target ? "active" : ""}`}
                    onClick={() => handleNav(item)}
                  >
                    <span className="nav-icon">{item.icon}</span>
                    <span>{item.label}</span>
                  </button>
                ))}
              </nav>

              <div className="sidebar-footer">
                <p className="footer-label">Device Mode</p>
                <p className="footer-value">{connectionLabel}</p>
                <div className="page-badges" style={{ marginTop: 12 }}>
                  <ToggleRow
                    label="Connected mode"
                    enabled={!simulationEnabled}
                    onClick={() => setSimulationEnabled((value) => !value)}
                  />
                </div>
                <p className="footer-note">Built for ESP32-C3 Super Mini with MPU-9250 fall detection logic.</p>
              </div>
            </aside>

            <main className="main">
              <header className="topbar">
                <div>
                  <div className="eyebrow">{currentPage.eyebrow}</div>
                  <h1>{currentPage.title}</h1>
                  <p className="topbar-copy">{active === "fall-events" && !simulationEnabled ? "Timeline logs and live stage transitions are combined here." : currentPage.copy}</p>
                </div>
                {showEmergencyActions ? (
                  <div className="topbar-actions">
                    <button className="button" type="button" onClick={() => setDemoState("PRE ALARM")}>Test Alert</button>
                    <button className="button primary" type="button" onClick={cancelFalseAlarm}>Cancel False Alarm</button>
                  </div>
                ) : null}
              </header>

              {renderPageContent()}
            </main>
          </div>
        );
      }

      function Metric({ label, value, note, accent }) {
        return (
          <article className="metric">
            <div className="metric-top">
              <span>{label}</span>
              <span style={{ color: accent }}>●</span>
            </div>
            <div className="metric-value">{value}</div>
            <div className="metric-note">{note}</div>
          </article>
        );
      }

      function InfoRow({ label, value }) {
        return (
          <div className="profile-row">
            <span className="row-label">{label}</span>
            <span className="row-value">{value}</span>
          </div>
        );
      }

      function Setting({ label, value }) {
        return (
          <div className="settings-row">
            <span className="row-label">{label}</span>
            <span className="row-value">{value}</span>
          </div>
        );
      }

      function ToggleRow({ label, enabled, onClick }) {
        return (
          <div className="settings-row">
            <span className="row-label">{label}</span>
            <button
              className={`toggle-button ${enabled ? "" : "off"}`}
              type="button"
              onClick={onClick}
              aria-label={`${label} ${enabled ? "on" : "off"}`}
              title={`${label}: ${enabled ? "On" : "Off"}`}
            ></button>
          </div>
        );
      }

      function InlineEditableRow({ label, value, onChange, type = "text", options }) {
        return (
          <div className="profile-row">
            <span className="row-label">{label}</span>
            {options ? (
              <select className="row-edit-control" value={value} onChange={onChange}>
                {options.map((option) => (
                  <option key={option} value={option}>
                    {option}
                  </option>
                ))}
              </select>
            ) : (
              <input className="row-edit-control" type={type} value={value} onChange={onChange} />
            )}
          </div>
        );
      }

      function EditableField({ label, value, onChange, type = "text", options, multiline = false }) {
        return (
          <div className="field">
            <label>{label}</label>
            {multiline ? (
              <textarea value={value} onChange={onChange} />
            ) : options ? (
              <select value={value} onChange={onChange}>
                {options.map((option) => (
                  <option key={option} value={option}>
                    {option}
                  </option>
                ))}
              </select>
            ) : (
              <input type={type} value={value} onChange={onChange} />
            )}
          </div>
        );
      }

      function EditableMetric({ label, value, onChange, suffix = "" }) {
        return (
          <article className="metric editable-card">
            <div className="metric-top">
              <span>{label}</span>
              <span style={{ color: "var(--mint)" }}>✎</span>
            </div>
            <div className="field" style={{ marginTop: 12 }}>
              <input value={value} onChange={onChange} />
            </div>
            {suffix ? <div className="metric-note">{suffix}</div> : <div className="metric-note">Editable value</div>}
          </article>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>

  </body>
</html>
